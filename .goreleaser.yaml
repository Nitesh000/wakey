project_name: wakey

before:
  hooks:
    - go mod tidy

builds:
  - id: wakey
    main: ./cmd/wakey
    binary: wakey
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_darwin_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: Nitesh000
    name: wakey

brews:
  - name: wakey
    homepage: "https://github.com/Nitesh000/wakey"
    description: "Keep your Mac awake by gently moving the cursor"
    license: "MIT"

    repository:
      owner: Nitesh000
      name: homebrew-wakey

    commit_author:
      name: github-actions
      email: actions@github.com

    install: |
      bin.install "wakey"
