name: Release Wakey

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install robotgo dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxtst-dev \
            libpng++-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxcomposite-dev

      - name: Build
        run: |
          mkdir dist
          go build -o dist/wakey-linux-amd64 ./cmd/wakey

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        run: |
          mkdir dist
          go build -o dist/wakey-darwin-arm64 ./cmd/wakey

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        run: |
          mkdir dist
          go build -o dist/wakey-windows-amd64.exe ./cmd/wakey

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
